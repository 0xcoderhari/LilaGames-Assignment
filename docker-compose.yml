version: '3.9'

services:
  cockroachdb:
    image: cockroachdb/cockroach:latest
    command: start-single-node --insecure --store=attrs=ssd,path=/var/lib/cockroach/
    volumes:
      - data:/var/lib/cockroach
    ports:
      - "26257:26257"
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?ready=1"]
      interval: 5s
      timeout: 5s
      retries: 5

  nakama:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      cockroachdb:
        condition: service_healthy
    entrypoint:
      [
        "/bin/sh",
        "-ec",
        "/nakama/nakama migrate up --database.address root@cockroachdb:26257 && exec /nakama/nakama --name nakama --database.address root@cockroachdb:26257 --logger.level DEBUG --session.token_expiry_sec 7200 --session.encryption_key supersecretkey"
      ]
    ports:
      - "7350:7350"
      - "7349:7349"
      - "7351:7351"

volumes:
  data: